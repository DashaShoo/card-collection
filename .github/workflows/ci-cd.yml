name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - staging
      - develop
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: dashashoo/card-collection/backend

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=build-${{ github.run_number }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "db_host=${{ secrets.PROD_DB_HOST }}" >> $GITHUB_OUTPUT
            echo "db_name=${{ secrets.PROD_DB_NAME }}" >> $GITHUB_OUTPUT
            echo "db_user=${{ secrets.PROD_DB_USER }}" >> $GITHUB_OUTPUT
            echo "jwt_secret=${{ secrets.PROD_JWT_SECRET }}" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "db_host=${{ secrets.STAGING_DB_HOST }}" >> $GITHUB_OUTPUT
            echo "db_name=${{ secrets.STAGING_DB_NAME }}" >> $GITHUB_OUTPUT
            echo "db_user=${{ secrets.STAGING_DB_USER }}" >> $GITHUB_OUTPUT
            echo "jwt_secret=${{ secrets.STAGING_JWT_SECRET }}" >> $GITHUB_OUTPUT
          fi

      - name: Create deployment info
        run: |
          cat > deployment-info.json << EOF
          {
            "environment": "${{ steps.env.outputs.environment }}",
            "image_tag": "${{ needs.build.outputs.image-tag }}",
            "build_number": ${{ github.run_number }},
            "commit_sha": "${{ github.sha }}",
            "commit_ref": "${{ github.ref }}",
            "timestamp": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
            "deployer": "${{ github.actor }}"
          }
          EOF
          echo "=== Deployment Info ==="
          cat deployment-info.json

      - name: Upload deployment info
        uses: actions/upload-artifact@v3
        with:
          name: deployment-info-${{ github.run_number }}
          path: deployment-info.json
